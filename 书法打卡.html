<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书法练习打卡</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "SimSun", "KaiTi", serif;
            /* D:\A-已经在写代码文字描述不止天地为何物了\2-书法打卡2.0 */
            background: url("兰亭集序.jpg") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.88);
            z-index: -1;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
        h1 {
            text-align: center;
            color: #8B0000;
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 8px;
        }
        .form-section { margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            color: #8B0000;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        input[type="date"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #8B0000;
            border-radius: 6px;
            font-size: 15px;
            font-family: inherit;
            background: #fff;
            color: #333;
        }
        input[type="date"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #DC143C;
            box-shadow: 0 0 5px rgba(220, 20, 60, 0.3);
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-weight: normal;
            color: #333;
        }
        input[type="radio"] {
            accent-color: #8B0000;
            width: 18px;
            height: 18px;
        }
        .upload-area {
            border: 2px dashed #8B0000;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            background: #FFF8F8;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: #FFF0F0;
            border-color: #DC143C;
        }
        .upload-area.dragover {
            background: #FFE4E4;
            border-color: #DC143C;
        }
        .upload-text {
            color: #8B0000;
            font-size: 15px;
        }
        .upload-hint {
            color: #999;
            font-size: 13px;
            margin-top: 8px;
        }
        input[type="file"] { display: none; }
        .preview-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .preview-item {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 6px;
            overflow: hidden;
            border: 2px solid #8B0000;
        }
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-item .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 24px;
            height: 24px;
            background: #8B0000;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            line-height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-msg {
            display: none;
            background: #8B0000;
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            text-align: center;
            margin: 15px 0;
            font-size: 15px;
        }
        .success-msg.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .char-count {
            text-align: right;
            color: #999;
            font-size: 13px;
            margin-top: 5px;
        }
        .char-count.warning {
            color: #DC143C;
            font-weight: bold;
        }
        .btn {
            background: #8B0000;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .btn:hover {
            background: #DC143C;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.3);
        }
        .btn:active { transform: translateY(0); }
        .btn-secondary {
            background: white;
            color: #8B0000;
            border: 2px solid #8B0000;
        }
        .btn-secondary:hover { background: #FFF0F0; }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .timeline-section { margin-top: 40px; }
        .section-title {
            color: #8B0000;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #8B0000;
            padding-bottom: 10px;
        }
        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 30px;
        }
        .records-list { margin-top: 20px; }
        .record-card {
            background: #FFF8F8;
            border: 2px solid #8B0000;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .record-card:hover {
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
        }
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .record-date {
            color: #8B0000;
            font-size: 18px;
            font-weight: bold;
        }
        .record-type {
            background: #8B0000;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 14px;
        }
        .record-duration {
            color: #DC143C;
            font-weight: bold;
            font-size: 15px;
        }
        .record-images {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        .record-image {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid #8B0000;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .record-image:hover { transform: scale(1.05); }
        .record-note {
            color: #333;
            line-height: 1.6;
            font-size: 15px;
            background: white;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #8B0000;
        }
        .record-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .record-actions .btn {
            padding: 6px 16px;
            font-size: 14px;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-title {
            color: #8B0000;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        .image-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .image-modal-overlay.show { display: flex; }
        .image-modal-content {
            max-width: 90%;
            max-height: 90%;
        }
        .image-modal-content img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 8px;
        }
        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 36px;
            cursor: pointer;
        }
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 16px;
        }
        .export-section {
            margin-top: 30px;
            text-align: center;
            padding-top: 20px;
            border-top: 2px solid #8B0000;
        }
        .export-btn {
            background: #8B0000;
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .export-btn:hover {
            background: #DC143C;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.3);
        }
        @media (max-width: 600px) {
            .container { padding: 15px; }
            h1 { font-size: 24px; }
            .record-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>书法练习打卡</h1>
        
        <div class="form-section">
            <div class="form-group">
                <label for="date">选择日期</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label>书法类型</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="calligraphyType" value="硬笔书法" checked>
                        硬笔书法
                    </label>
                    <label>
                        <input type="radio" name="calligraphyType" value="软笔书法">
                        软笔书法
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="duration">练习时长</label>
                <select id="duration" required>
                    <option value="0.25">0.25小时 (15分钟)</option>
                    <option value="0.5">0.5小时 (30分钟)</option>
                    <option value="1" selected>1小时</option>
                    <option value="1.5">1.5小时</option>
                    <option value="2">2小时</option>
                </select>
            </div>

            <div class="form-group">
                <label>上传图片（最多3张）</label>
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-text">📷 点击或拖拽上传图片</div>
                    <div class="upload-hint">支持 JPG、PNG 格式，最多3张</div>
                </div>
                <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFileSelect(event)">
                <div class="preview-container" id="previewContainer"></div>
                <div class="success-msg" id="successMsg">✅ 图片上传成功！</div>
            </div>

            <div class="form-group">
                <label for="note">练习心得</label>
                <textarea id="note" placeholder="请输入您的练习心得（150字以内）..." maxlength="150" oninput="updateCharCount()"></textarea>
                <div class="char-count" id="charCount">0 / 150</div>
            </div>

            <div class="btn-group">
                <button class="btn" onclick="submitRecord()">提交打卡</button>
                <button class="btn btn-secondary" onclick="resetForm()">重置</button>
            </div>
        </div>

        <div class="timeline-section">
            <div class="section-title">练习时间轴</div>
            <div class="chart-container">
                <canvas id="timelineChart"></canvas>
            </div>
            
            <div class="section-title">打卡记录</div>
            <div class="records-list" id="recordsList">
                <div class="empty-state">暂无打卡记录，快去开始第一次练习吧！</div>
            </div>
        </div>

        <div class="export-section">
            <button class="export-btn" onclick="exportData()">📥 导出打卡记录</button>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <div class="modal-title">编辑打卡记录</div>
            <div class="form-group">
                <label>练习心得</label>
                <textarea id="editNote" maxlength="150" style="width:100%; min-height:100px; padding:12px; border:2px solid #8B0000; border-radius:6px; font-family:inherit; font-size:15px;"></textarea>
                <div class="char-count" id="editCharCount">0 / 150</div>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="saveEdit()">保存修改</button>
                <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 图片预览模态框 -->
    <div class="image-modal-overlay" id="imageModal" onclick="closeImageModal()">
        <div class="image-modal-close">&times;</div>
        <div class="image-modal-content">
            <img id="modalImage" src="" alt="预览">
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('calligraphyRecords')) || [];
        let currentImages = [];
        let editingId = null;
        let chartInstance = null;

        document.getElementById('date').valueAsDate = new Date();

        const uploadArea = document.getElementById('uploadArea');
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            handleFiles(files);
        });

        function handleFileSelect(event) {
            handleFiles(Array.from(event.target.files));
        }

        function handleFiles(files) {
            const remainingSlots = 3 - currentImages.length;
            if (remainingSlots <= 0) {
                alert('最多只能上传3张图片');
                return;
            }
            const filesToProcess = files.slice(0, remainingSlots);
            filesToProcess.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImages.push(e.target.result);
                    updatePreview();
                    showSuccessMsg();
                };
                reader.readAsDataURL(file);
            });
        }

        function updatePreview() {
            const container = document.getElementById('previewContainer');
            container.innerHTML = currentImages.map((img, index) => `
                <div class="preview-item">
                    <img src="${img}" alt="预览">
                    <button class="remove-btn" onclick="removeImage(${index})">&times;</button>
                </div>
            `).join('');
        }

        function removeImage(index) {
            currentImages.splice(index, 1);
            updatePreview();
        }

        function showSuccessMsg() {
            const msg = document.getElementById('successMsg');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        function updateCharCount() {
            const note = document.getElementById('note');
            const count = document.getElementById('charCount');
            const len = note.value.length;
            count.textContent = `${len} / 150`;
            count.classList.toggle('warning', len >= 140);
        }

        function submitRecord() {
            const date = document.getElementById('date').value;
            const type = document.querySelector('input[name="calligraphyType"]:checked').value;
            const duration = parseFloat(document.getElementById('duration').value);
            const note = document.getElementById('note').value.trim();

            if (!date) {
                alert('请选择日期');
                return;
            }

            const record = {
                id: Date.now(),
                date: date,
                type: type,
                duration: duration,
                images: [...currentImages],
                note: note,
                createdAt: new Date().toISOString()
            };

            records.push(record);
            records.sort((a, b) => new Date(a.date) - new Date(b.date));
            saveRecords();
            renderRecords();
            updateChart();
            resetForm();
            alert('打卡成功！');
        }

        function resetForm() {
            document.getElementById('date').valueAsDate = new Date();
            document.querySelector('input[name="calligraphyType"][value="硬笔书法"]').checked = true;
            document.getElementById('duration').value = '1';
            document.getElementById('note').value = '';
            currentImages = [];
            updatePreview();
            updateCharCount();
            document.getElementById('fileInput').value = '';
        }

        function saveRecords() {
            localStorage.setItem('calligraphyRecords', JSON.stringify(records));
        }

        function renderRecords() {
            const container = document.getElementById('recordsList');
            if (records.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无打卡记录，快去开始第一次练习吧！</div>';
                return;
            }

            container.innerHTML = records.slice().reverse().map(record => `
                <div class="record-card" data-id="${record.id}">
                    <div class="record-header">
                        <span class="record-date">📅 ${record.date}</span>
                        <span class="record-type">${record.type}</span>
                        <span class="record-duration">⏱ ${record.duration}小时</span>
                    </div>
                    ${record.images.length > 0 ? `
                        <div class="record-images">
                            ${record.images.map(img => `<img src="${img}" class="record-image" onclick="openImageModal('${img}')" alt="练习作品">`).join('')}
                        </div>
                    ` : ''}
                    ${record.note ? `<div class="record-note">${record.note}</div>` : ''}
                    <div class="record-actions">
                        <button class="btn" onclick="editRecord(${record.id})">✏️ 编辑心得</button>
                        <button class="btn btn-secondary" onclick="deleteRecord(${record.id})">🗑️ 删除</button>
                    </div>
                </div>
            `).join('');
        }

        function editRecord(id) {
            const record = records.find(r => r.id === id);
            if (!record) return;
            editingId = id;
            document.getElementById('editNote').value = record.note;
            document.getElementById('editCharCount').textContent = `${record.note.length} / 150`;
            document.getElementById('editModal').classList.add('show');
        }

        function saveEdit() {
            const note = document.getElementById('editNote').value.trim();
            const record = records.find(r => r.id === editingId);
            if (record) {
                record.note = note;
                saveRecords();
                renderRecords();
                closeEditModal();
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            editingId = null;
        }

        function deleteRecord(id) {
            if (!confirm('确定要删除这条打卡记录吗？')) return;
            records = records.filter(r => r.id !== id);
            saveRecords();
            renderRecords();
            updateChart();
        }

        function openImageModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('show');
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('show');
        }

        function updateChart() {
            const ctx = document.getElementById('timelineChart').getContext('2d');
            const recordsWithImages = records.filter(r => r.images.length > 0);
            
            if (recordsWithImages.length === 0) {
                if (chartInstance) {
                    chartInstance.destroy();
                    chartInstance = null;
                }
                return;
            }

            const labels = recordsWithImages.map(r => r.date);
            const data = recordsWithImages.map(r => r.duration);

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '练习时长（小时）',
                        data: data,
                        backgroundColor: 'rgba(139, 0, 0, 0.7)',
                        borderColor: '#8B0000',
                        borderWidth: 2,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `时长: ${context.parsed.y} 小时`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: '日期',
                                color: '#8B0000',
                                font: { size: 14, weight: 'bold' }
                            },
                            ticks: { color: '#333' }
                        },
                        y: {
                            title: {
                                display: true,
                                text: '练习时长（小时）',
                                color: '#8B0000',
                                font: { size: 14, weight: 'bold' }
                            },
                            beginAtZero: true,
                            ticks: { color: '#333' }
                        }
                    }
                }
            });
        }

        function exportData() {
            if (records.length === 0) {
                alert('暂无记录可导出');
                return;
            }

            const exportData = {
                exportTime: new Date().toLocaleString('zh-CN'),
                records: records.map(r => ({
                    date: r.date,
                    type: r.type,
                    duration: r.duration,
                    note: r.note,
                    imageCount: r.images.length
                }))
            };

            let htmlContent = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>书法练习打卡记录 - ${new Date().toLocaleDateString('zh-CN')}</title>
<style>
body { font-family: "Microsoft YaHei", serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
h1 { color: #8B0000; text-align: center; }
.record { background: white; border: 2px solid #8B0000; border-radius: 8px; padding: 20px; margin: 15px 0; }
.record-date { color: #8B0000; font-size: 18px; font-weight: bold; }
.record-type { background: #8B0000; color: white; padding: 4px 12px; border-radius: 4px; display: inline-block; margin: 10px 0; }
.record-duration { color: #DC143C; font-weight: bold; }
.record-note { background: #FFF8F8; padding: 10px; border-left: 3px solid #8B0000; margin: 10px 0; }
.record-images { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
.record-images img { max-width: 200px; max-height: 200px; border: 1px solid #8B0000; border-radius: 4px; }
.summary { background: white; border: 2px solid #8B0000; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
</style>
</head>
<body>
<h1>书法练习打卡记录</h1>
<div class="summary">
    <p><strong>导出时间：</strong>${exportData.exportTime}</p>
    <p><strong>总记录数：</strong>${records.length} 条</p>
    <p><strong>总练习时长：</strong>${records.reduce((sum, r) => sum + r.duration, 0).toFixed(2)} 小时</p>
</div>
`;

            records.forEach((record, idx) => {
                htmlContent += `
<div class="record">
    <div class="record-date">📅 ${record.date}</div>
    <div class="record-type">${record.type}</div>
    <div class="record-duration">⏱ 练习时长：${record.duration} 小时</div>
    ${record.note ? `<div class="record-note">${record.note}</div>` : ''}
    ${record.images.length > 0 ? `<div class="record-images">${record.images.map(img => `<img src="${img}" alt="练习作品">`).join('')}</div>` : ''}
</div>
`;
            });

            htmlContent += `
</body>
</html>`;

            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `书法练习打卡记录_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('导出成功！文件包含所有日期、图片和心得。');
        }

        document.getElementById('editNote').addEventListener('input', function() {
            document.getElementById('editCharCount').textContent = `${this.value.length} / 150`;
        });

        renderRecords();
        updateChart();
        updateCharCount();
    </script>
</body>
</html>
